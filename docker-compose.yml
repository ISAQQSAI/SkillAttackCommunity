services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: skillattack-community:latest
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["npm", "run", "start", "--", "--hostname", "0.0.0.0"]
    volumes:
      - sac_var:/app/var
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/home').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    image: skillattack-community:latest
    restart: unless-stopped
    env_file:
      - .env.production
    command: ["python3", "worker/main.py"]
    volumes:
      - sac_var:/app/var
    depends_on:
      web:
        condition: service_healthy

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sac_var:
  caddy_data:
  caddy_config:
